<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f4c81" />
  <title>CTI IA DSS — PWA limpia</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><img src="logo.png" alt="DDS" /><div><h1>CTI IA</h1><p>Metodología de apoyo a la decisión técnica</p></div></div>
    <div class="case-picker"><label>Caso</label><select id="caseSelect"></select></div>
  </header>
  <main>
    <nav id="tabs" class="tabs"></nav>
    <section id="view" class="view"></section>
  </main>
  <footer class="footer"><button id="saveBtn">Guardar</button><button id="exportBtn">Exportar sesión</button><button id="importBtn">Importar casos JSON</button><button id="resetBtn">Vaciar sesión</button><input id="importFile" type="file" accept="application/json" hidden><span id="status">Listo</span></footer>
  <script src="app_data.js"></script>
  <script src="app.js"></script>
</body>
</html>
